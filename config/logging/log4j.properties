# Flink Log4j2 configuration
status = WARN
name = FlinkLog4j2

property.filename = logs/flink.log

appender.console.type = Console
appender.console.name = ConsoleAppender
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss,SSS} %-5p %-60c %x - %m%n

appender.file.type = File
appender.file.name = FileAppender
appender.file.fileName = ${filename}
appender.file.layout.type = PatternLayout
appender.file.layout.pattern = %d{yyyy-MM-dd HH:mm:ss,SSS} %-5p %-60c %x - %m%n

rootLogger.level = INFO
rootLogger.appenderRefs = console, file
rootLogger.appenderRef.console.ref = ConsoleAppender
rootLogger.appenderRef.file.ref = FileAppender

logger.flink.name = org.apache.flink
logger.flink.level = INFO
logger.flink.additivity = false
logger.flink.appenderRefs = console, file
logger.flink.appenderRef.console.ref = ConsoleAppender
logger.flink.appenderRef.file.ref = FileAppender