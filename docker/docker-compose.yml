services:
  salesgen:
    build:
      context: ../salesgen
      dockerfile: Dockerfile
    image: salesgen:latest
    container_name: salesgen
    depends_on:
      - kafka
    environment:
      - KAFKA_BROKER=kafka:9092
      - SALESGEN_TOPIC=sales-events
      - SALESGEN_RATE=10
    # SALESGEN_RATE: events per second
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8082:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    depends_on:
      - kafka
  postgres:
    image: postgres:15
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=purchase_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - ./pgsql/:/docker-entrypoint-initdb.d/
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_LISTENERS=PLAINTEXT://:9092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
    depends_on:
      - zookeeper
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
      - ZOOKEEPER_CLIENT_PORT=2181
  jobmanager:
    image: purchase-report-job:latest
    container_name: flink-jobmanager
    ports:
      - "8081:8081"
    environment:
      - JOB_MANAGER_RPC_ADDRESS=jobmanager
    entrypoint: /bin/sh -c "chown flink:flink /opt/flink/conf/flink-application-custom.yaml && FLINK_CONF_DIR=/opt/flink/conf FLINK_CONF_FILE=/opt/flink/conf/flink-application-custom.yaml exec /docker-entrypoint.sh jobmanager"
    volumes:
      - ./purchase-report-1.0-SNAPSHOT.jar:/opt/flink/job.jar
      - ./config/flink-conf/flink-application.conf:/opt/flink/conf/flink-application-custom.yaml
      - ../flink-data:/flink-data
  taskmanager:
    image: purchase-report-job:latest
    container_name: flink-taskmanager
    depends_on:
      - jobmanager
    environment:
      - JOB_MANAGER_RPC_ADDRESS=jobmanager
    entrypoint: /bin/sh -c "chown flink:flink /opt/flink/conf/flink-application-custom.yaml && FLINK_CONF_DIR=/opt/flink/conf FLINK_CONF_FILE=/opt/flink/conf/flink-application-custom.yaml exec /docker-entrypoint.sh taskmanager"
    volumes:
      - ./config/flink-conf/flink-application.conf:/opt/flink/conf/flink-application-custom.yaml
      - ../flink-data:/flink-data

  # S3 emulation
  localstack:
    container_name: localstack
    image: localstack/localstack
    ports:
      - "0.0.0.0:4566:4566"
      - "0.0.0.0:4510-4559:4510-4559"
    environment:
      - DEBUG=${DEBUG:-0}
      - SERVICES=s3
      - DEFAULT_REGION=us-east-1
      - DATA_DIR=/tmp/localstack/data
    volumes:
      - localstack-data:/tmp/localstack/data
      - /var/run/docker.sock:/var/run/docker.sock
volumes:
  localstack-data:
