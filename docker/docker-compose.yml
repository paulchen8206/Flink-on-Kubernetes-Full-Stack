version: '3.8'
services:
  jobmanager:
    image: flink:1.18.0
    container_name: flink-jobmanager
    ports:
      - "8081:8081"
    environment:
      - JOB_MANAGER_RPC_ADDRESS=jobmanager
    command: jobmanager
  taskmanager:
    image: flink:1.18.0
    container_name: flink-taskmanager
    depends_on:
      - jobmanager
    environment:
      - JOB_MANAGER_RPC_ADDRESS=jobmanager
    command: taskmanager
  purchase-report-job:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: purchase-report-job:latest
    container_name: purchase-report-job
    depends_on:
      - jobmanager
      - taskmanager
      - kafka
      - postgres
    environment:
      - FLINK_PROPERTIES=jobmanager.rpc.address=jobmanager
    # Build the JAR first, then build the Docker image

  # S3 emulation
  localstack:
    image: localstack/localstack:3.4
    container_name: localstack
    ports:
      - "4566:4566" # Edge port for all services
      - "4571:4571"
    environment:
      - SERVICES=s3
      - DEFAULT_REGION=us-east-1
      - DATA_DIR=/tmp/localstack/data
    volumes:
      - ./localstack-data:/tmp/localstack/data
      - /var/run/docker.sock:/var/run/docker.sock

  # S3-compatible storage
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - ./minio-data:/data

  # Kafka stack
  kafka:
    image: bitnami/kafka:3.6.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_LISTENERS=PLAINTEXT://:9092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
    depends_on:
      - zookeeper

  zookeeper:
    image: bitnami/zookeeper:3.8.0
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes

  # Event generator
  salesgen:
    image: ghcr.io/datastack-net/salesgen:latest
    container_name: salesgen
    depends_on:
      - kafka
    environment:
      - KAFKA_BROKER=kafka:9092
      - SALESGEN_TOPIC=sales-events
      - SALESGEN_RATE=10
    # SALESGEN_RATE: events per second

  # Kafka UI
  kafka-control-center:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-control-center
    ports:
      - "8082:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    depends_on:
      - kafka

  # PostgreSQL
  postgres:
    image: postgres:15
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=purchase_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - ./pgsql/init.sql:/docker-entrypoint-initdb.d/init.sql
